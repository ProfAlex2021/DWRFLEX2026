<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <!-- incluir css/style.css -->
        <link href="css/style.css" rel="stylesheet" />
    </head>

    <body>
        <!-- limite visual da página (container) -->
        <main>
            <!-- limite visual do formulário (content)-->
            <section>
                <form>
                    <!-- Título do formulário -->
                    <h3>Formulário de entrada</h3>
                    <!-- Linha do formulário -->
                    <div>
                        <label for="txt_nome">Nome: </label>
                        <input type="text" placeholder="Digite seu nome" id="txt_nome" />
                    </div>
                    <div>
                        <label for="txt_email">E-mail: </label>
                        <input type="email" placeholder="Digite seu e-mail" id="txt_email" />
                    </div>
                    <div>
                        <button type="submit">Enviar</button>
                        <button type="reset">Limpar</button>
                    </div>
                </form>
            </section>
        </main>
    </body>

</html>
